---
openapi: 3.1.1
info:
  title: BoxLite Cloud Sandbox REST API
  version: 0.1.0
  description: |
    RESTful API for the BoxLite cloud sandbox service.

    BoxLite provides hardware-level VM isolation for secure, isolated code execution.
    This API exposes sandbox lifecycle management, command execution, file transfer,
    and image management as a multi-tenant cloud service.

    ## Design Principles

    This specification follows industry-standard REST API patterns:
    - Versioned prefix (`/v1/`) for graceful API evolution
    - Multi-tenancy via `{prefix}` path segment (organization/workspace)
    - Capability discovery via `GET /v1/config`
    - Optional idempotency keys for safe mutation retries
    - Opaque page-token pagination
    - Standard error model with typed error codes

    ## Authentication

    All endpoints (except `GET /v1/config` and the `/v1/oauth/*` endpoints)
    require an opaque token in the `Authorization: Bearer` header (RFC 6750).
    The server is **bearer-format-agnostic** — any token its validation
    pipeline can verify is accepted. See the `BearerAuth` security scheme
    for the supported token sources, which include BoxLite-issued API keys
    and OAuth tokens, plus (configurable per deployment) federated SSO JWTs,
    third-party OIDC tokens, and customer-issued gateway tokens.

    The CLI's `boxlite auth login` provides the two BoxLite-issued paths
    (`--api-key-stdin` for API keys, `--web` for OAuth device flow). Other
    sources are configured at the customer's gateway or IdP layer.

    Validate a freshly-acquired token via `GET /v1/me`.

    ## Execution Model

    Command execution is two-step:
    1. `POST /exec` creates the execution and returns an `execution_id`.
    2. `GET /executions/{exec_id}/attach` upgrades to a bidirectional
       WebSocket carrying stdin, stdout, stderr, and in-band control
       (resize, signal, exit). One attach at a time per exec; the exec
       continues running across WebSocket close so the SDK can reattach.

    Out-of-band control endpoints exist for clients that prefer a REST
    style: `GET /executions/{exec_id}` (status), `POST .../resize`,
    `POST .../signal`, `DELETE /executions/{exec_id}` (kill).
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: BoxLite
    url: https://github.com/boxlite-ai/boxlite

servers:
  - url: "{scheme}://{host}/v1"
    description: BoxLite Sandbox API v1
    variables:
      scheme:
        default: https
        enum: [https, http]
      host:
        default: api.boxlite.ai

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - BearerAuth: []

tags:
  - name: Configuration
    description: Server capability discovery
  - name: Authentication
    description: Credential validation and identity lookup
  - name: Boxes
    description: Sandbox box lifecycle management
  - name: Execution
    description: Command execution and streaming
  - name: Files
    description: File upload and download
  - name: Metrics
    description: Runtime and per-box metrics
  - name: Images
    description: Container image management

# ===========================================================================
# Paths
# ===========================================================================
paths:

  # -------------------------------------------------------------------------
  # Configuration & Discovery
  # -------------------------------------------------------------------------
  /config:
    get:
      operationId: getConfig
      summary: Get server configuration and capabilities
      description: |
        Returns server defaults, enforced limits, and supported features.
        Clients should call this on startup to adapt behavior.
        No authentication required.
      tags: [Configuration]
      security: []
      responses:
        "200":
          description: Server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxConfig"

  # -------------------------------------------------------------------------
  # Authentication
  # -------------------------------------------------------------------------
  /me:
    get:
      operationId: getCurrentPrincipal
      summary: Identity and scopes for the calling credential
      description: |
        Returns the principal (user or service account) and granted scopes for
        the Bearer credential in the request. Used by `boxlite auth login` to
        validate freshly-pasted keys and by `boxlite auth status` to render
        the identity banner.
      tags: [Authentication]
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /oauth/device_code:
    post:
      operationId: initiateDeviceAuthorization
      summary: Begin the OAuth 2.0 device authorization flow (RFC 8628)
      description: |
        CLI calls this without credentials to start a device-flow login. The
        response contains a short `user_code` the human pastes into the
        verification URL (or opens the `verification_uri_complete` directly),
        plus a `device_code` the CLI polls `/v1/oauth/token` with.

        Device flow is preferred over loopback PKCE because BoxLite users
        often run the CLI inside containers / SSH sessions / remote dev pods
        where binding `127.0.0.1` for a callback fails.
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/DeviceAuthorizationRequest"
      responses:
        "200":
          description: Device flow initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceAuthorizationResponse"

  /oauth/token:
    post:
      operationId: exchangeOAuthToken
      summary: Exchange a device_code (or refresh_token) for an access token
      description: |
        Handles two grant types:
          - `urn:ietf:params:oauth:grant-type:device_code` (RFC 8628 §3.4):
            CLI polls this after `/v1/oauth/device_code` until the user
            authorizes in their browser. Returns
            `authorization_pending` / `slow_down` (HTTP 400) until ready.
          - `refresh_token` (RFC 6749 §6): rotates the refresh token and
            returns a fresh access token. The previous refresh_token is
            invalidated; reusing it triggers family invalidation (Auth0
            pattern) — all tokens in the chain are revoked.

        No `client_secret` is accepted; the CLI is a public OAuth client.
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
      responses:
        "200":
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
        "400":
          description: |
            Standard OAuth 2.0 error responses (RFC 6749 §5.2 + RFC 8628 §3.5):
              - `authorization_pending` — user has not yet authorized; CLI
                should continue polling.
              - `slow_down` — polling too frequently; increase interval by 5s.
              - `expired_token` — device_code expired; restart the flow.
              - `access_denied` — user explicitly denied.
              - `invalid_grant` — refresh_token rejected (reused, revoked, or
                family invalidated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /oauth/revoke:
    post:
      operationId: revokeOAuthToken
      summary: Revoke an OAuth token (RFC 7009)
      description: |
        Logout. Revokes the supplied token (and its family, if it is a
        refresh token). Always returns 200 per RFC 7009 §2.2 — never leaks
        whether the token existed.
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/OAuthRevokeRequest"
      responses:
        "200":
          description: Revoked (always returned, idempotent)

  # -------------------------------------------------------------------------
  # Boxes
  # -------------------------------------------------------------------------
  /{prefix}/boxes:
    parameters:
      - $ref: "#/components/parameters/prefix"

    post:
      operationId: createBox
      summary: Create a new sandbox box
      description: |
        Creates a new sandbox box with the specified configuration.
        The box starts in `configured` status. Call `POST /start` to
        initialize the VM, or it will start lazily on first `exec`.
      tags: [Boxes]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoxRequest"
      responses:
        "201":
          description: Box created
          headers:
            Location:
              description: URL of the created box
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"

    get:
      operationId: listBoxes
      summary: List all boxes
      description: |
        Returns a paginated list of boxes in the workspace.
        Optionally filter by status or name.
      tags: [Boxes]
      parameters:
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pageToken"
        - name: status
          in: query
          description: Filter by box status
          schema:
            $ref: "#/components/schemas/BoxStatus"
      responses:
        "200":
          description: List of boxes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBoxesResponse"

  /{prefix}/boxes/{box_id}:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"

    get:
      operationId: getBox
      summary: Get box details
      description: Returns full metadata for a box. Accepts box ID (ULID) or name.
      tags: [Boxes]
      responses:
        "200":
          description: Box details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "404":
          $ref: "#/components/responses/NotFoundError"

    head:
      operationId: boxExists
      summary: Check if a box exists
      description: Returns 204 if the box exists, 404 if not. No response body.
      tags: [Boxes]
      responses:
        "204":
          description: Box exists
        "404":
          description: Box not found

    delete:
      operationId: removeBox
      summary: Remove a box
      description: |
        Removes a box and all its associated data (disk, config, state).
        Use `?force=true` to force-remove a running box.
      tags: [Boxes]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
        - name: force
          in: query
          description: Force remove even if the box is running
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Box removed
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  # -------------------------------------------------------------------------
  # Box Lifecycle
  # -------------------------------------------------------------------------
  /{prefix}/boxes/{box_id}/start:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: startBox
      summary: Start a box (initialize VM)
      description: |
        Initializes the VM for a box. Idempotent: if already running, returns
        current state. Transitions: configured → running, stopped → running.
      tags: [Boxes]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      responses:
        "200":
          description: Box started (or already running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/stop:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: stopBox
      summary: Stop a box (terminate VM)
      description: |
        Gracefully stops the VM. The box transitions to `stopped` status.
        If `auto_remove` was set on creation, the box is also deleted.
      tags: [Boxes]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopBoxRequest"
      responses:
        "200":
          description: Box stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  # -------------------------------------------------------------------------
  # Snapshot / Portability
  # -------------------------------------------------------------------------
  /{prefix}/boxes/{box_id}/snapshots:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: createSnapshot
      summary: Create a snapshot
      description: |
        Creates a named snapshot from the box's current stopped disk state.
        The box must be stopped.
      tags: [Boxes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSnapshotRequest"
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    get:
      operationId: listSnapshots
      summary: List box snapshots
      tags: [Boxes]
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSnapshotsResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /{prefix}/boxes/{box_id}/snapshots/{snapshot_name}:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - name: snapshot_name
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getSnapshot
      summary: Get snapshot details
      tags: [Boxes]
      responses:
        "200":
          description: Snapshot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: removeSnapshot
      summary: Remove a snapshot
      tags: [Boxes]
      responses:
        "204":
          description: Snapshot removed
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/snapshots/{snapshot_name}/restore:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - name: snapshot_name
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: restoreSnapshot
      summary: Restore box from snapshot
      description: Restores the box's stopped disks from a named snapshot.
      tags: [Boxes]
      responses:
        "204":
          description: Snapshot restored
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/clone:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: cloneBox
      summary: Clone a box
      description: |
        Creates a new box cloned from the source box's current stopped disk state.
        The source box must be stopped.
      tags: [Boxes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneBoxRequest"
      responses:
        "201":
          description: Cloned box created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/export:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: exportBox
      summary: Export a box archive
      description: Exports a stopped box as a portable archive payload.
      tags: [Boxes]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportBoxRequest"
      responses:
        "200":
          description: Archive payload
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /{prefix}/boxes/import:
    parameters:
      - $ref: "#/components/parameters/prefix"
    post:
      operationId: importBox
      summary: Import a box from an archive
      description: |
        Imports a `.boxlite` archive (produced by the export endpoint) to create
        a new box. The archive is uploaded as a binary payload.
      tags: [Boxes]
      parameters:
        - name: name
          in: query
          description: Name for the imported box (auto-generated if omitted)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Imported box created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Box"
        "400":
          $ref: "#/components/responses/ValidationError"

  # -------------------------------------------------------------------------
  # Execution
  # -------------------------------------------------------------------------
  /{prefix}/boxes/{box_id}/exec:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    post:
      operationId: startExecution
      summary: Start an asynchronous command execution
      description: |
        Starts a command in the box and returns an execution ID immediately.
        The box is automatically started if not already running.

        Use the returned `execution_id` to:
        - Attach stdio: `GET /executions/{exec_id}/attach` (WebSocket)
        - Check status: `GET /executions/{exec_id}`
        - Send signal: `POST /executions/{exec_id}/signal`
        - Resize PTY: `POST /executions/{exec_id}/resize`
        - Kill: `DELETE /executions/{exec_id}`
      tags: [Execution]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecRequest"
      responses:
        "201":
          description: Execution started
          headers:
            Location:
              description: URL of the execution resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/executions/{exec_id}:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - $ref: "#/components/parameters/execId"
    get:
      operationId: getExecution
      summary: Get execution status
      description: Returns the current status and result of an execution.
      tags: [Execution]
      responses:
        "200":
          description: Execution status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionInfo"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: killExecution
      summary: Kill execution (SIGKILL + evict)
      description: |
        Terminates the execution with SIGKILL and removes it from the
        server's session map atomically. Use this rather than
        `POST /signal` with `signal=9` — the signal endpoint rejects
        SIGKILL because it cannot perform the eviction half of the
        operation.

        On success, any attached WebSocket on `/attach` is closed; the
        SDK observes an `{"type":"exit","exit_code":...}` text frame
        followed by a normal close.
      tags: [Execution]
      responses:
        "204":
          description: Execution killed and evicted.
        "404":
          $ref: "#/components/responses/NotFoundError"

  /{prefix}/boxes/{box_id}/executions/{exec_id}/attach:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - $ref: "#/components/parameters/execId"
    get:
      operationId: attachExecution
      summary: Attach to an execution (WebSocket)
      description: |
        Opens a bidirectional WebSocket carrying stdin, stdout, stderr, and
        in-band control for a previously-created execution. This is the
        canonical streaming path for an execution.

        **Single-attach.** Only one client may be attached at a time. A
        second `GET /attach` to the same `exec_id` while one is connected
        returns `409 Conflict` (no upgrade). The exec keeps running across
        WebSocket close — the SDK can reconnect to the same `exec_id` and
        resume streaming. Orphaned sessions are reaped per the runner's
        configured policy (default: SIGHUP after 5 min idle).

        **Frame protocol.**

        Client → Server:
        - **Binary frame** — raw bytes appended to the execution's stdin pipe.
        - **Text frame** (JSON) — control messages:
          - `{"type":"resize","cols":120,"rows":40}` — terminal resize.
          - `{"type":"signal","sig":15}` — send a Unix signal. Whitelist
            matches `POST /signal` (HUP/INT/QUIT/ABRT/USR1/USR2/TERM/WINCH);
            non-whitelisted signals respond with a `{"type":"error",...}`
            text frame and the connection stays open.
          - `{"type":"stdin_eof"}` — close stdin (EOF to the PTY).

        Server → Client:
        - **Binary frame** — `[channel:u8][payload:bytes]`. Channel is
          `0x01` for stdout, `0x02` for stderr. TTY-mode executions only
          emit `0x01` since the kernel merges stdout/stderr into the PTY.
        - **Text frame** (JSON) — control messages:
          - `{"type":"exit","exit_code":N}` on process exit. Followed by a
            normal WebSocket close (1000).
          - `{"type":"error","message":"..."}` on non-fatal internal errors
            (e.g., rejected signal value). Connection stays open.

        **Keepalive.** The server emits a WebSocket `Ping` control frame
        every 15 seconds. Clients are expected to respond with `Pong`
        (most libraries do this automatically). Either side may treat the
        absence of frames for >45s as a dead connection.
      tags: [Execution]
      responses:
        "101":
          description: WebSocket upgrade successful; bidirectional protocol begins.
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          description: Another client is already attached to this execution.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /{prefix}/boxes/{box_id}/executions/{exec_id}/signal:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - $ref: "#/components/parameters/execId"
    post:
      operationId: signalExecution
      summary: Send a signal to an execution
      description: |
        Sends a POSIX signal to the running execution.
        Common signals: 9 (SIGKILL), 15 (SIGTERM), 2 (SIGINT).
      tags: [Execution]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalRequest"
      responses:
        "204":
          description: Signal sent
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /{prefix}/boxes/{box_id}/executions/{exec_id}/resize:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
      - $ref: "#/components/parameters/execId"
    post:
      operationId: resizeExecution
      summary: Resize execution TTY
      description: |
        Resizes the pseudo-terminal for a TTY-enabled execution.
        Only applicable to executions started with `tty: true`.
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResizeRequest"
      responses:
        "204":
          description: TTY resized
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  # -------------------------------------------------------------------------
  # Files
  # -------------------------------------------------------------------------
  /{prefix}/boxes/{box_id}/files:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"

    put:
      operationId: uploadFiles
      summary: Upload files into the box
      description: |
        Uploads a tar archive and extracts it at the specified path
        inside the container. The box must be running.
      tags: [Files]
      parameters:
        - name: path
          in: query
          required: true
          description: Destination path inside the container
          schema:
            type: string
          example: /app
        - name: overwrite
          in: query
          description: Overwrite existing files at destination
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/x-tar:
            schema:
              type: string
              format: binary
              description: Tar archive to extract at destination
      responses:
        "204":
          description: Upload successful
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

    get:
      operationId: downloadFiles
      summary: Download files from the box
      description: |
        Downloads files from the specified path inside the container
        as a tar archive. The box must be running.
      tags: [Files]
      parameters:
        - name: path
          in: query
          required: true
          description: Source path inside the container
          schema:
            type: string
          example: /app/output
        - name: follow_symlinks
          in: query
          description: Follow symlinks when archiving
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Tar archive of requested path
          content:
            application/x-tar:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  # -------------------------------------------------------------------------
  # Metrics
  # -------------------------------------------------------------------------
  /{prefix}/metrics:
    parameters:
      - $ref: "#/components/parameters/prefix"
    get:
      operationId: getRuntimeMetrics
      summary: Get runtime-wide metrics
      description: |
        Returns aggregate metrics across all boxes in the workspace.
        All counters are monotonic (never decrease).
      tags: [Metrics]
      responses:
        "200":
          description: Runtime metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeMetrics"

  /{prefix}/boxes/{box_id}/metrics:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/boxId"
    get:
      operationId: getBoxMetrics
      summary: Get per-box metrics
      description: |
        Returns resource usage and execution metrics for a specific box.
        Includes CPU, memory, network, and stage-level boot timing.
      tags: [Metrics]
      responses:
        "200":
          description: Box metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoxMetrics"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # -------------------------------------------------------------------------
  # Images
  # -------------------------------------------------------------------------
  /{prefix}/images/pull:
    parameters:
      - $ref: "#/components/parameters/prefix"
    post:
      operationId: pullImage
      summary: Pull a container image
      description: |
        Pulls a container image from a registry and caches it locally.
        Returns 200 with image info when the pull completes.
      tags: [Images]
      parameters:
        - $ref: "#/components/parameters/idempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullImageRequest"
      responses:
        "200":
          description: Image pulled and cached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageInfo"
        "422":
          $ref: "#/components/responses/UnprocessableEntityError"

  /{prefix}/images:
    parameters:
      - $ref: "#/components/parameters/prefix"
    get:
      operationId: listImages
      summary: List cached images
      description: Returns a paginated list of locally cached container images.
      tags: [Images]
      parameters:
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/pageToken"
      responses:
        "200":
          description: List of cached images
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListImagesResponse"

  /{prefix}/images/{image_id}:
    parameters:
      - $ref: "#/components/parameters/prefix"
      - $ref: "#/components/parameters/imageId"

    get:
      operationId: getImage
      summary: Get image details
      description: Returns metadata for a cached image by its manifest digest.
      tags: [Images]
      responses:
        "200":
          description: Image details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageInfo"
        "404":
          $ref: "#/components/responses/NotFoundError"

    head:
      operationId: imageExists
      summary: Check if an image is cached
      description: Returns 204 if the image exists in the local cache, 404 if not.
      tags: [Images]
      responses:
        "204":
          description: Image exists
        "404":
          description: Image not found

# ===========================================================================
# Components
# ===========================================================================
components:

  # -------------------------------------------------------------------------
  # Security Schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer authentication. The wire format is RFC 6750 — an opaque token
        passed as `Authorization: Bearer <token>`. The server is **format-
        agnostic**: any token its validation pipeline can verify is accepted.

        ## Token sources the server validates

        Which sources are enabled depends on deployment configuration. The
        validation pipeline is pluggable; new sources can be added without
        client changes.

          1. **BoxLite-issued** (always enabled). Tokens minted by this
             server come in three kinds:
               - `blk_live_…` / `blk_test_…` — dashboard-issued API keys.
                 Long-lived, org-scoped, survives teammate offboarding.
                 Use for CI, server-side automation, SDK integrations.
                 Issued at `https://app.boxlite.ai/settings/api-keys`.
               - `blo_…` — OAuth access tokens from `POST /v1/oauth/token`
                 (device-flow grant). 15-minute lifetime. Acts as the
                 specific user who authorized via `boxlite auth login --web`.
               - `blr_…` — OAuth refresh tokens. Only sent to
                 `POST /v1/oauth/token` (`grant_type=refresh_token`), never
                 as `Authorization: Bearer` for resource calls.
          2. **Federated SSO / enterprise JWTs** (optional, per-deployment).
             JWTs issued by a configured enterprise IdP (Okta, Auth0,
             Azure AD, Google Workspace). Validated against the IdP's JWKS;
             `iss`, `aud`, `sub`, `exp` claims checked. Principal is
             projected from claims into the BoxLite identity model.
          3. **Third-party OIDC tokens** (optional, per-deployment). Access
             tokens from public IdPs (GitHub, Google, Anthropic). Validated
             by introspection against the IdP's userinfo endpoint. Used by
             "Sign in with X" integrations.
          4. **Customer-issued passthrough tokens** (optional, when a
             customer fronts the BoxLite gateway with their own auth layer).
             The customer's gateway authenticates the request, attaches a
             token in a configured format, and BoxLite trusts the upstream
             chain.

        Clients (SDKs, CLI) treat all of these identically — opaque strings
        carried in `Authorization: Bearer`. The CLI's `boxlite auth login`
        provides the two BoxLite-issued paths (API key paste, OAuth device
        flow); other sources are configured at the customer's gateway or
        IdP layer.

  # -------------------------------------------------------------------------
  # Parameters
  # -------------------------------------------------------------------------
  parameters:
    prefix:
      name: prefix
      in: path
      required: true
      description: |
        Organization or workspace identifier for multi-tenancy isolation.
        All resources are scoped to this prefix.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
      example: acme-corp

    boxId:
      name: box_id
      in: path
      required: true
      description: |
        Server-assigned opaque box identifier, or a user-defined name.
        Clients MUST treat the value as opaque and pass it back verbatim
        in subsequent box-scoped requests. Examples seen in deployed
        servers (non-normative): ULID (`01HJK4TNRPQSXYZ8WM6NCVT9R5`),
        12-character Base62 (`aB3cD4eF5gH6`), UUID
        (`d406c59d-eb09-4bc3-9b3a-62455c7e8f32`), prefixed (`sb_abc123`),
        user-defined name (`my-sandbox`).
      schema:
        type: string
        minLength: 1
        maxLength: 128
      example: 01HJK4TNRPQSXYZ8WM6NCVT9R5

    execId:
      name: exec_id
      in: path
      required: true
      description: Execution identifier returned by `POST /exec`
      schema:
        type: string
      example: exec-01HJK5ABCDEF

    imageId:
      name: image_id
      in: path
      required: true
      description: Image manifest digest (e.g., `sha256:abc123...`)
      schema:
        type: string
      example: "sha256:a3ed95caeb02ffe68cdd9fd84406680ae93d633cb16422d00e8a7c22955b46d4"

    pageSize:
      name: pageSize
      in: query
      description: Maximum number of results per page
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    pageToken:
      name: pageToken
      in: query
      description: |
        Opaque token for the next page of results.
        Returned as `next_page_token` in list responses.
        Clients must not parse or interpret this value.
      schema:
        type: string

    idempotencyKey:
      name: Idempotency-Key
      in: header
      description: |
        Optional client-provided UUID for safe request retries.
        If the server has already processed a request with this key,
        it returns the original response without re-executing.
        Same key with different payload returns 422.
        Keys expire after the duration advertised in `GET /v1/config`.
      schema:
        type: string
        format: uuid
      example: "017f22e2-79b0-7cc3-98c4-dc0c0c07398f"

  # -------------------------------------------------------------------------
  # Responses (Error Templates)
  # -------------------------------------------------------------------------
  responses:
    BadRequestError:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: "invalid argument: cpus must be between 1 and 32"
              type: InvalidArgumentError
              code: 400

    UnauthorizedError:
      description: Missing or invalid authentication credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: "invalid or expired access token"
              type: UnauthorizedError
              code: 401

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: "box not found: 01HJK4TNRPQSXYZ8WM6NCVT9R5"
              type: NotFoundError
              code: 404

    ConflictError:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: "invalid state: box is already running"
              type: InvalidStateError
              code: 409

    UnprocessableEntityError:
      description: Request understood but cannot be processed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              message: "image error: failed to pull python:nonexistent"
              type: ImageError
              code: 422

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:

    # =======================================================================
    # Configuration
    # =======================================================================
    SandboxConfig:
      type: object
      description: Server configuration and capabilities
      properties:
        defaults:
          type: object
          description: Default values applied when not specified in requests
          properties:
            cpus:
              type: integer
              description: Default vCPU count
              example: 2
            memory_mib:
              type: integer
              description: Default memory in MiB
              example: 512
            disk_size_gb:
              type: integer
              description: Default disk size in GB
              example: 10
            security_preset:
              type: string
              description: Default security preset
              example: standard
            auto_remove:
              type: boolean
              description: Default auto-remove on stop
              example: true
        overrides:
          type: object
          description: Server-enforced overrides that clients cannot change
          additionalProperties:
            type: string
        capabilities:
          type: object
          description: Server capability limits and feature flags
          properties:
            max_cpus:
              type: integer
              description: Maximum allowed vCPUs per box
              example: 32
            max_memory_mib:
              type: integer
              description: Maximum allowed memory in MiB
              example: 16384
            max_disk_size_gb:
              type: integer
              description: Maximum allowed disk size in GB
              example: 100
            max_boxes_per_prefix:
              type: integer
              description: Maximum boxes per organization/workspace
              example: 50
            max_concurrent_executions:
              type: integer
              description: Maximum concurrent executions per box
              example: 10
            file_transfer_max_bytes:
              type: integer
              description: Maximum file upload/download size in bytes
              example: 1073741824
            exec_timeout_max_seconds:
              type: number
              description: Maximum allowed execution timeout in seconds
              example: 3600
            tty_enabled:
              type: boolean
              description: Whether WebSocket TTY sessions are supported
              example: true
            streaming_enabled:
              type: boolean
              description: Whether WebSocket attach output streaming is supported
              example: true
            snapshots_enabled:
              type: boolean
              description: Whether snapshot create/list/get/remove/restore is supported
              example: true
            clone_enabled:
              type: boolean
              description: Whether box clone is supported
              example: true
            export_enabled:
              type: boolean
              description: Whether box export is supported
              example: true
            supported_security_presets:
              type: array
              items:
                type: string
              example: [development, standard, maximum]
            idempotency_key_lifetime:
              type: string
              description: How long idempotency keys are retained (ISO 8601 duration)
              example: PT24H

    # =======================================================================
    # Authentication
    # =======================================================================
    Principal:
      type: object
      description: |
        Identity and scope payload returned by `GET /v1/me`. The CLI uses
        `email`/`display_name` to render `Logged in as ...` after a successful
        `boxlite auth login`, and `scopes` to surface under-scoped credentials
        at login time rather than mid-flow.
      required: [sub, principal_type, prefix, scopes]
      properties:
        sub:
          type: string
          description: |
            Stable opaque principal identifier. Clients MUST treat the value
            as opaque — the server may change format (UUID, ULID, Base62, or
            prefixed) without notice. Survives email and display-name renames.
        principal_type:
          type: string
          enum: [user, service_account]
          description: |
            `user` for interactive dashboard-issued keys; `service_account`
            for automation keys. Modeled as a sum type rather than a nullable
            `user_id` field so the SDK can dispatch by variant.
        email:
          type: string
          format: email
          description: |
            Email of the user behind the key. Absent for `service_account`
            principals.
        display_name:
          type: string
          description: Human-readable label. Optional.
        prefix:
          type: string
          description: |
            Tenant/workspace prefix the credential is bound to. The CLI uses
            this to populate `--prefix` defaults on subsequent calls.
        scopes:
          type: array
          items:
            type: string
            example: "boxes:read"
          description: |
            Granted scope strings (`boxes:read`, `boxes:write`, etc.). The
            CLI checks these at login so under-scoped credentials surface
            immediately rather than at first use.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Optional expiry. `null` for long-lived dashboard-issued keys;
            ISO 8601 timestamp for rotating credentials.

    DeviceAuthorizationRequest:
      type: object
      required: [client_id]
      properties:
        client_id:
          type: string
          description: |
            Public client identifier. The BoxLite CLI uses the literal
            value `boxlite-cli`. No `client_secret` — public client.
          example: boxlite-cli
        scope:
          type: string
          description: |
            Space-delimited scope list (RFC 6749 §3.3). Defaults to the
            full set the CLI needs.
          example: "box:read box:write box:exec image:read image:write me:read"

    DeviceAuthorizationResponse:
      type: object
      required: [device_code, user_code, verification_uri, expires_in, interval]
      description: |
        RFC 8628 §3.2 device authorization response.
      properties:
        device_code:
          type: string
          description: Opaque code the CLI polls `/oauth/token` with.
        user_code:
          type: string
          description: |
            Short human-typeable code (8 chars, dash-separated). The user
            enters this at `verification_uri`.
          example: "WDJB-MJHT"
        verification_uri:
          type: string
          format: uri
          description: URL the user opens to authorize.
          example: "https://app.boxlite.ai/activate"
        verification_uri_complete:
          type: string
          format: uri
          description: |
            Optional URL that embeds `user_code` for one-click activation.
            The CLI displays this as a clickable link when available.
          example: "https://app.boxlite.ai/activate?user_code=WDJB-MJHT"
        expires_in:
          type: integer
          description: Lifetime of `device_code` in seconds.
          example: 600
        interval:
          type: integer
          description: Minimum seconds between polls of `/oauth/token`.
          example: 5

    OAuthTokenRequest:
      type: object
      required: [grant_type]
      description: |
        Form-encoded request to `POST /oauth/token`. The `grant_type`
        determines which other fields are required.
      properties:
        grant_type:
          type: string
          enum:
            - "urn:ietf:params:oauth:grant-type:device_code"
            - "refresh_token"
          description: |
            `device_code` grant requires `device_code` + `client_id`.
            `refresh_token` grant requires `refresh_token` + `client_id`.
        device_code:
          type: string
          description: Required when grant_type is `device_code`.
        refresh_token:
          type: string
          description: Required when grant_type is `refresh_token`.
        client_id:
          type: string
          description: Public client identifier (e.g., `boxlite-cli`).

    OAuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      description: RFC 6749 §5.1 token response.
      properties:
        access_token:
          type: string
          description: |
            Opaque bearer token starting with `blo_`. Send as
            `Authorization: Bearer <access_token>` to resource endpoints.
          example: "blo_AbCdEfGhIjKlMnOpQrStUvWxYz012345"
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
          example: 900
        refresh_token:
          type: string
          description: |
            Opaque token starting with `blr_`. Stored by the CLI and used
            to obtain a fresh `access_token`. Rotated on every refresh.
          example: "blr_ZyXwVuTsRqPoNmLkJiHgFeDcBa543210"
        scope:
          type: string
          description: Granted scopes (space-delimited).

    OAuthRevokeRequest:
      type: object
      required: [token]
      description: RFC 7009 §2.1 token revocation request.
      properties:
        token:
          type: string
          description: |
            The access_token or refresh_token to revoke. If a refresh_token
            is provided, the entire token family is invalidated.
        token_type_hint:
          type: string
          enum: [access_token, refresh_token]
          description: |
            Optional hint to speed up server-side lookup. Servers MUST
            still extend the search to the other type if the hinted lookup
            fails (§4.1.2).

    OAuthError:
      type: object
      required: [error]
      description: RFC 6749 §5.2 / RFC 8628 §3.5 error response.
      properties:
        error:
          type: string
          enum:
            - authorization_pending
            - slow_down
            - expired_token
            - access_denied
            - invalid_grant
            - invalid_request
            - invalid_client
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
        error_description:
          type: string
          description: Human-readable explanation, optional per §5.2.
        error_uri:
          type: string
          format: uri
          description: Optional URL to a page explaining the error.

    # =======================================================================
    # Error Model
    # =======================================================================
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorModel"

    ErrorModel:
      type: object
      description: |
        Standard error response. Maps directly to BoxliteError variants.
        `UnauthorizedError` is a server-layer error (auth middleware) and does
        not correspond to a BoxliteError variant in the core library.
      required: [message, type, code]
      properties:
        message:
          type: string
          description: Human-readable error message with context
          example: "box not found: 01HJK4TNRPQSXYZ8WM6NCVT9R5"
        type:
          type: string
          description: Error type identifier (matches BoxliteError variants)
          enum:
            - UnsupportedError
            - EngineError
            - ConfigError
            - StorageError
            - ImageError
            - PortalError
            - NetworkError
            - RpcError
            - RpcTransportError
            - InternalError
            - ExecutionError
            - NotFoundError
            - AlreadyExistsError
            - InvalidStateError
            - DatabaseError
            - MetadataError
            - InvalidArgumentError
            - StoppedError
            - UnauthorizedError
          example: NotFoundError
        code:
          type: integer
          description: HTTP response status code
          minimum: 400
          maximum: 599
          example: 404
        stack:
          type: array
          description: Stack trace (only included when server debug mode is enabled)
          items:
            type: string

    # =======================================================================
    # Box
    # =======================================================================
    Box:
      type: object
      description: Sandbox box metadata (maps to BoxInfo)
      required: [box_id, status, created_at, updated_at, image, cpus, memory_mib]
      properties:
        box_id:
          type: string
          description: |
            Server-assigned opaque identifier. Clients MUST treat the value
            as opaque and pass it back verbatim in subsequent box-scoped
            requests. The server is the authority on identifier format —
            implementations have used 26-character ULID, 12-character
            Base62, UUID, prefixed strings (`sb_abc123`), and other shapes.
            Clients should accept any printable URL-/path-safe string up
            to the documented length bound.
          minLength: 1
          maxLength: 128
          example: 01HJK4TNRPQSXYZ8WM6NCVT9R5
        name:
          type: string
          nullable: true
          description: User-defined name (unique within prefix)
          example: my-sandbox
        status:
          $ref: "#/components/schemas/BoxStatus"
        created_at:
          type: string
          format: date-time
          description: Box creation timestamp (UTC)
        updated_at:
          type: string
          format: date-time
          description: Last state change timestamp (UTC)
        pid:
          type: integer
          nullable: true
          description: VMM subprocess PID (null if not running)
        image:
          type: string
          description: OCI image reference or rootfs path
          example: python:3.11-slim
        cpus:
          type: integer
          minimum: 1
          maximum: 32
          description: Allocated vCPU cores
          example: 2
        memory_mib:
          type: integer
          minimum: 128
          description: Allocated memory in MiB
          example: 512
        labels:
          type: object
          additionalProperties:
            type: string
          description: User-defined key-value labels

    BoxStatus:
      type: string
      description: |
        Box lifecycle state machine:
        - `configured`: Created, VM not yet started
        - `running`: VM active, accepting commands
        - `stopping`: Graceful shutdown in progress (transient)
        - `stopped`: VM terminated, can be restarted
        - `paused`: VM frozen via SIGSTOP (during snapshot/export)
        - `unknown`: Error recovery state
      enum:
        - configured
        - running
        - stopping
        - stopped
        - paused
        - unknown

    CreateBoxRequest:
      type: object
      description: Configuration for creating a new box (maps to BoxOptions)
      properties:
        name:
          type: string
          description: Unique name within the workspace
          minLength: 1
          maxLength: 128
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
          example: dev-sandbox
        image:
          type: string
          description: OCI image reference
          default: "alpine:latest"
          example: python:3.11-slim
        rootfs_path:
          type: string
          description: |
            Path to a pre-built rootfs (alternative to `image`).
            Mutually exclusive with `image`.
        cpus:
          type: integer
          minimum: 1
          maximum: 32
          description: Number of vCPUs to allocate
          example: 2
        memory_mib:
          type: integer
          minimum: 128
          description: Memory in MiB to allocate
          example: 512
        disk_size_gb:
          type: integer
          minimum: 1
          description: Disk size in GB (sparse, grows as needed)
        working_dir:
          type: string
          description: Default working directory inside the container
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables as key-value pairs
          example:
            PYTHONPATH: /app
            DEBUG: "1"
        entrypoint:
          type: array
          items:
            type: string
          description: Override image ENTRYPOINT
        cmd:
          type: array
          items:
            type: string
          description: Override image CMD
        user:
          type: string
          description: "User to run as (format: <name|uid>[:<group|gid>])"
          example: "1000:1000"
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/VolumeSpec"
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        network:
          $ref: "#/components/schemas/NetworkSpec"
        secrets:
          type: array
          items:
            $ref: "#/components/schemas/SecretSpec"
          description: |
            Secret placeholder rules for outbound HTTP(S) requests.
            Matching requests replace `placeholder` with `value` on the host side.
        auto_remove:
          type: boolean
          description: Automatically remove box when stopped
          default: true
        detach:
          type: boolean
          description: Box survives parent process exit
          default: false
        security:
          $ref: "#/components/schemas/SecurityPreset"

    VolumeSpec:
      type: object
      description: Host-to-guest filesystem mount
      required: [host_path, guest_path]
      properties:
        host_path:
          type: string
          description: Path on the host filesystem
        guest_path:
          type: string
          description: Mount point inside the container
        read_only:
          type: boolean
          default: false

    NetworkSpec:
      type: object
      description: Structured network configuration for the box
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          type: string
          enum: [enabled, disabled]
          description: |
            `enabled` allows guest networking. `disabled` removes the guest network interface.
        allow_net:
          type: array
          items:
            type: string
          description: |
            Optional outbound allowlist used only when `mode=enabled`.
            Empty or omitted means full outbound access.
            Supports hostnames, wildcard hostnames, IPs, and CIDRs.

    PortSpec:
      type: object
      description: Port forwarding rule (host → guest)
      required: [guest_port]
      properties:
        host_port:
          type: integer
          minimum: 0
          maximum: 65535
          description: Host port (0 or omit for dynamic assignment)
        guest_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Container port to expose
        protocol:
          type: string
          enum: [tcp, udp]
          default: tcp
        host_ip:
          type: string
          description: Host IP to bind (defaults to 0.0.0.0)

    SecretSpec:
      type: object
      description: Outbound HTTP(S) secret substitution rule
      required: [name, value]
      properties:
        name:
          type: string
          description: Human-readable secret name
        value:
          type: string
          description: Real secret value. Never enters the guest VM.
        hosts:
          type: array
          items:
            type: string
          description: Matching hosts for this secret. Empty means no host restriction.
        placeholder:
          type: string
          description: |
            Placeholder string visible inside the guest.
            Defaults to `<BOXLITE_SECRET:{name}>` when omitted.

    SecurityPreset:
      type: string
      description: |
        Security isolation preset:
        - `development`: Minimal isolation for debugging
        - `standard`: Recommended for most use cases (jailer + seccomp on Linux)
        - `maximum`: All isolation features enabled (untrusted workloads)
      enum:
        - development
        - standard
        - maximum
      default: standard

    Snapshot:
      type: object
      required:
        - id
        - box_id
        - name
        - created_at
        - guest_disk_bytes
        - container_disk_bytes
        - size_bytes
      properties:
        id:
          type: string
          description: Snapshot ULID
        box_id:
          type: string
          description: Owning box ULID
        name:
          type: string
          description: Snapshot name unique per box
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds)
        guest_disk_bytes:
          type: integer
          format: int64
        container_disk_bytes:
          type: integer
          format: int64
        size_bytes:
          type: integer
          format: int64

    CreateSnapshotRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128

    ListSnapshotsResponse:
      type: object
      required: [snapshots]
      properties:
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/Snapshot"

    CloneBoxRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: Name for the cloned box (auto-generated if omitted)

    ExportBoxRequest:
      type: object
      description: Forward-compatible export options (no configurable fields yet).

    StopBoxRequest:
      type: object
      properties:
        timeout_seconds:
          type: number
          minimum: 0
          description: Graceful shutdown timeout in seconds. After expiry, force-kill.
          default: 30

    ListBoxesResponse:
      type: object
      required: [boxes]
      properties:
        boxes:
          type: array
          items:
            $ref: "#/components/schemas/Box"
        next_page_token:
          type: string
          nullable: true
          description: |
            Opaque token for next page. Null or absent if no more results.

    # =======================================================================
    # Execution
    # =======================================================================
    ExecRequest:
      type: object
      description: Command execution request (maps to BoxCommand)
      required: [command]
      properties:
        command:
          type: string
          description: Program to execute
          example: python3
        args:
          type: array
          items:
            type: string
          description: Command arguments
          example: ["-c", "print('hello')"]
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variable overrides for this execution
        timeout_seconds:
          type: number
          minimum: 0.1
          description: Execution timeout in seconds
        working_dir:
          type: string
          description: Working directory override for this execution
        tty:
          type: boolean
          default: false
          description: Enable pseudo-terminal allocation

    ExecResponse:
      type: object
      description: Response from starting an async execution
      required: [execution_id]
      properties:
        execution_id:
          type: string
          description: Unique execution identifier
          example: exec-01HJK5ABCDEF

    ExecutionInfo:
      type: object
      description: Execution status and result
      required: [execution_id, status]
      properties:
        execution_id:
          type: string
        status:
          type: string
          description: Current execution status
          enum:
            - running
            - completed
            - killed
            - timed_out
        exit_code:
          type: integer
          nullable: true
          description: Process exit code (null while running)
        started_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
          nullable: true
          description: Total execution duration in milliseconds
        error_message:
          type: string
          nullable: true
          description: Diagnostic message if process died unexpectedly

    SignalRequest:
      type: object
      required: [signal]
      properties:
        signal:
          type: integer
          description: |
            POSIX signal number to send.
            Common values: 2 (SIGINT), 9 (SIGKILL), 15 (SIGTERM).
          example: 9

    ResizeRequest:
      type: object
      required: [cols, rows]
      properties:
        cols:
          type: integer
          minimum: 1
          description: Terminal width in columns
          example: 120
        rows:
          type: integer
          minimum: 1
          description: Terminal height in rows
          example: 40

    # =======================================================================
    # Metrics
    # =======================================================================
    RuntimeMetrics:
      type: object
      description: Aggregate metrics across all boxes (maps to RuntimeMetrics)
      properties:
        boxes_created_total:
          type: integer
          description: Total boxes created since runtime startup (monotonic)
        boxes_failed_total:
          type: integer
          description: Total boxes that failed to start (monotonic)
        boxes_stopped_total:
          type: integer
          description: Total boxes stopped (monotonic)
        num_running_boxes:
          type: integer
          description: Currently running boxes (calculated)
        total_commands_executed:
          type: integer
          description: Total commands across all boxes (monotonic)
        total_exec_errors:
          type: integer
          description: Total execution errors across all boxes (monotonic)

    BoxMetrics:
      type: object
      description: Per-box resource usage and execution metrics (maps to BoxMetrics)
      properties:
        commands_executed_total:
          type: integer
          description: Commands executed on this box (monotonic)
        exec_errors_total:
          type: integer
          description: Execution errors on this box (monotonic)
        bytes_sent_total:
          type: integer
          description: Bytes sent to box via stdin (monotonic)
        bytes_received_total:
          type: integer
          description: Bytes received from box via stdout/stderr (monotonic)
        cpu_percent:
          type: number
          format: float
          nullable: true
          description: CPU usage percentage (0.0 - 100.0)
        memory_bytes:
          type: integer
          nullable: true
          description: Current memory usage in bytes
        network_bytes_sent:
          type: integer
          nullable: true
          description: Network bytes sent (host → guest)
        network_bytes_received:
          type: integer
          nullable: true
          description: Network bytes received (guest → host)
        network_tcp_connections:
          type: integer
          nullable: true
          description: Current ESTABLISHED TCP connections
        network_tcp_errors:
          type: integer
          nullable: true
          description: Total failed TCP connection attempts
        boot_timing:
          $ref: "#/components/schemas/BootTiming"

    BootTiming:
      type: object
      description: Stage-level initialization timing breakdown (milliseconds)
      properties:
        total_create_ms:
          type: integer
          nullable: true
          description: Total time from create() to box ready
        guest_boot_ms:
          type: integer
          nullable: true
          description: Time from subprocess spawn to guest agent ready
        filesystem_setup_ms:
          type: integer
          nullable: true
          description: "Stage 1: directory structure creation"
        image_prepare_ms:
          type: integer
          nullable: true
          description: "Stage 2: image pull and layer extraction"
        guest_rootfs_ms:
          type: integer
          nullable: true
          description: "Stage 3: guest rootfs bootstrap"
        box_config_ms:
          type: integer
          nullable: true
          description: "Stage 4: disk and network configuration"
        box_spawn_ms:
          type: integer
          nullable: true
          description: "Stage 5: subprocess spawn"
        container_init_ms:
          type: integer
          nullable: true
          description: "Stage 6: container initialization inside guest"

    # =======================================================================
    # Images
    # =======================================================================
    ImageInfo:
      type: object
      description: Cached container image metadata (maps to ImageInfo)
      required: [reference, repository, tag, id, cached_at]
      properties:
        reference:
          type: string
          description: Full image reference
          example: docker.io/library/python:3.11-slim
        repository:
          type: string
          description: Repository name
          example: docker.io/library/python
        tag:
          type: string
          description: Image tag
          example: 3.11-slim
        id:
          type: string
          description: Image manifest digest
          example: "sha256:a3ed95caeb02ffe68cdd9fd84406680ae93d633cb16422d00e8a7c22955b46d4"
        cached_at:
          type: string
          format: date-time
          description: When the image was pulled into the local cache
        size_bytes:
          type: integer
          nullable: true
          description: Image size in bytes

    PullImageRequest:
      type: object
      required: [reference]
      properties:
        reference:
          type: string
          description: Image reference to pull from registry
          example: python:3.11-slim

    ListImagesResponse:
      type: object
      required: [images]
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageInfo"
        next_page_token:
          type: string
          nullable: true
          description: Opaque token for next page
