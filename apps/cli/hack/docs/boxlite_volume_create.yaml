name: boxlite volume create
synopsis: Create a volume
usage: boxlite volume create [NAME] [flags]
options:
  - name: size
    shorthand: s
    default_value: '10'
    usage: Size of the volume in GB
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for boxlite
see_also:
  - boxlite volume - Manage BoxLite volumes
