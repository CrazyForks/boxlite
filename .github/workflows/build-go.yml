# Test Go SDK and tag Go module for publishing.
#
# Downloads the prebuilt C SDK archive from GitHub Releases via go generate,
# then runs Go tests — validating the exact workflow that end users follow.
#
# On release, creates a Go module tag (sdks/go/vX.Y.Z) so the module is
# available via: go get github.com/boxlite-ai/boxlite/sdks/go@vX.Y.Z
#
# User workflow:
#   go get github.com/boxlite-ai/boxlite/sdks/go
#   go generate github.com/boxlite-ai/boxlite/sdks/go
#   go build ./...
#
# Triggers:
# - workflow_run: After Build C SDK completes (ensures archives are uploaded
#   before tagging the Go module, so go generate works immediately)
# - workflow_dispatch: Manual trigger for testing
name: Build Go SDK

on:
  workflow_run:
    workflows: ["Build C SDK"]
    types: [completed]
  workflow_dispatch:

jobs:
  config:
    uses: ./.github/workflows/config.yml

  # ============================================================================
  # TEST
  # ============================================================================
  # Runs `go generate` to download the prebuilt C SDK archive, then builds
  # and tests the Go SDK — validating the exact end-user workflow.
  # ============================================================================
  test:
    name: Test (${{ matrix.target }})
    needs: config
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.platforms) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.config.outputs.go-version }}

      - name: Download prebuilt library
        run: |
          cd sdks/go
          go generate .

      - name: Test Go SDK
        run: |
          cd sdks/go
          go build ./...
          go test -v ./...

  # ============================================================================
  # TAG GO MODULE
  # ============================================================================
  # Creates a Go module tag (sdks/go/vX.Y.Z) so the module is available via:
  #   go get github.com/boxlite-ai/boxlite/sdks/go@vX.Y.Z
  #
  # Go uses the tag format <module-path>/vX.Y.Z for modules that don't live
  # at the repository root. pkg.go.dev indexes the module automatically.
  # ============================================================================
  tag-go-module:
    name: Tag Go Module
    needs: test
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to push tags

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Go module tag
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          GO_TAG="sdks/go/v${VERSION}"
          echo "Creating Go module tag: ${GO_TAG}"

          # Skip if tag already exists (idempotent)
          if git rev-parse "${GO_TAG}" >/dev/null 2>&1; then
            echo "Tag ${GO_TAG} already exists, skipping"
            exit 0
          fi

          git tag "${GO_TAG}"
          git push origin "${GO_TAG}"
          echo "Go module tag ${GO_TAG} pushed successfully"
