# BoxLite test runner configuration for cargo-nextest
#
# Profiles:
#   default  — local development (balanced speed + reliability)
#   ci       — GitHub Actions (unit tests only, stricter timeouts)
#   vm       — integration tests that boot real VMs (generous timeouts)

[store]
dir = "target/nextest"

# =============================================================================
# DEFAULT PROFILE (local development)
# =============================================================================
[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 1
fail-fast = true
status-level = "slow"
final-status-level = "flaky"

# =============================================================================
# CI PROFILE (unit tests only, no VM access)
# =============================================================================
[profile.ci]
slow-timeout = { period = "30s", terminate-after = 3 }
retries = 2
fail-fast = false

# =============================================================================
# VM PROFILE (integration/E2E tests that boot real VMs)
# =============================================================================
[profile.vm]
test-threads = 4
slow-timeout = { period = "120s", terminate-after = 5 }
retries = 0
fail-fast = false
failure-output = "immediate"
success-output = "immediate"

# =============================================================================
# TEST GROUP OVERRIDES
# =============================================================================

# CLI integration tests now use per-test TempDir (parallel-safe).
